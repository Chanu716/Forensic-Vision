experiment:
  name: phase1_baseline
  seed: 42

data:
  root_dir: data
  raw_dir: data/raw
  processed_dir: data/processed
  manifests_dir: data/manifests
  interim_dir: data/interim
  image_size: [112, 112]
  clip_length: 49
  clip_stride: 49
  channels: 3
  num_classes: 3
  video_extensions: [".avi", ".mp4", ".mov", ".mkv"]
  train_ratio: 0.75
  val_ratio: 0.10
  test_ratio: 0.15
  forgery_lengths: [10, 30, 50, 75, 100, 150]
  max_videos_per_class:
  resize_interpolation: linear
  save_intermediate_videos: true
  class_names:
    - authentic
    - frame_insertion
    - frame_deletion

training:
  batch_size: 16
  epochs: 40
  learning_rate: 0.001
  weight_decay: 0.0005
  num_workers: 4

model:
  in_channels: 3
  clip_length: 49
  num_classes: 3
  conv_channels: [32, 64, 128]
  dropout: 0.2

localization:
  threshold: 0.8
